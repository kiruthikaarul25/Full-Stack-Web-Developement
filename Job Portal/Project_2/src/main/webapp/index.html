<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Job Portal | Career Hub</title>
    <style>
        /* ----- RESET & GLOBAL STYLES (matching dashboard aesthetic) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e6edf7 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* ----- MAIN CARD (CENTERED, SAME ELEGANT DESIGN) ----- */
        .portal-card {
            background: #ffffff;
            max-width: 580px;
            width: 100%;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            padding: 2.5rem 2rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
        }

        .portal-card:hover {
            box-shadow: 0 30px 50px -18px rgba(0, 0, 0, 0.3);
        }

        /* ----- TITLE STYLES (matches dashboard heading) ----- */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(115deg, #1E2A5E, #2c3e66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.75rem;
            border-left: none;
            padding-left: 0;
        }

        .tagline {
            color: #475569;
            font-size: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #eef2ff;
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        /* ----- BUTTON GROUP (FLEXIBLE, MODERN) ----- */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0 1rem;
        }

        /* LINK STYLES — identical pill/button style from dashboard */
        .portal-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(100deg, #1e3a8a, #2563eb);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.75rem 1.6rem;
            border-radius: 2rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 8px rgba(37, 99, 235, 0.2);
            letter-spacing: 0.2px;
        }

        .portal-btn:hover {
            background: linear-gradient(100deg, #0f2b6d, #1d4ed8);
            transform: translateY(-2px);
            box-shadow: 0 10px 18px -6px #1e3a8a60;
        }

        .portal-btn:active {
            transform: translateY(1px);
        }

        /* secondary / outline style for variety (optional but cohesive) */
        .portal-btn-outline {
            background: transparent;
            border: 1.5px solid #2563eb;
            color: #1e3a8a;
            box-shadow: none;
            background: white;
        }

        .portal-btn-outline:hover {
            background: #eff6ff;
            transform: translateY(-2px);
            border-color: #1d4ed8;
            box-shadow: 0 6px 12px -8px #1e3a8a;
        }

        /* responsive adjustments */
        @media (max-width: 520px) {
            .portal-card {
                padding: 1.8rem;
                border-radius: 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .button-group {
                flex-direction: column;
                align-items: stretch;
                gap: 0.8rem;
            }
            .portal-btn {
                justify-content: center;
                padding: 0.7rem 1rem;
            }
        }

        /* subtle icon decorations */
        .portal-btn[href="register.html"]::before {
            content: "📝";
            font-size: 1rem;
        }
        .portal-btn[href="login.html"]::before {
            content: "👤";
            font-size: 1rem;
        }
        .portal-btn[href="admin.html"]::before {
            content: "🔒";
            font-size: 1rem;
        }

        /* remove extra pseudo from outline if needed */
        .portal-btn-outline::before {
            filter: none;
        }
    </style>
</head>
<body>

<div class="portal-card">
    <h1>🚀 Job Portal</h1>
    <div class="tagline">Your next career opportunity starts here</div>

    <div class="button-group">
        <a href="register.html" class="portal-btn">Register</a>
        <a href="login.html" class="portal-btn portal-btn-outline">User Login</a>
        <a href="admin.html" class="portal-btn">Admin Login</a>
    </div>
</div>

</body>
</html>

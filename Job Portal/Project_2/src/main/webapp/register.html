<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register | Job Portal</title>
    <style>
        /* ----- RESET & GLOBAL (matching all other pages) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e6edf7 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* ----- MAIN CARD (centered, elegant, same as login) ----- */
        .register-card {
            background: #ffffff;
            max-width: 460px;
            width: 100%;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            padding: 2rem 2rem 2.2rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .register-card:hover {
            box-shadow: 0 30px 50px -18px rgba(0, 0, 0, 0.3);
        }

        /* ----- HEADER STYLES (matches dashboard heading) ----- */
        h2 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(115deg, #1E2A5E, #2c3e66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            border-left: 5px solid #3b82f6;
            padding-left: 1rem;
            margin-bottom: 1.8rem;
        }

        /* ----- FORM STYLES (identical input treatment) ----- */
        .register-form {
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .input-group label::before {
            content: "•";
            color: #3b82f6;
            font-weight: 800;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            font-family: inherit;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            background-color: #fefefe;
            transition: all 0.2s ease;
            outline: none;
            color: #0f172a;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background-color: #ffffff;
        }

        input::placeholder {
            color: #94a3b8;
            font-weight: 400;
            font-size: 0.9rem;
        }

        /* ----- BUTTON (green gradient for register, but same style) ----- */
        .register-btn {
            background: linear-gradient(100deg, #059669, #10b981);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.9rem 1rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.6rem;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 8px rgba(5, 150, 105, 0.2);
            width: 100%;
        }

        .register-btn:hover {
            background: linear-gradient(100deg, #047857, #059669);
            transform: scale(1.01);
            box-shadow: 0 10px 18px -6px #059669;
        }

        .register-btn:active {
            transform: scale(0.98);
        }

        /* ----- LOGIN LINK (styled like pill) ----- */
        .login-wrapper {
            text-align: center;
            margin-top: 2rem;
            padding-top: 0.5rem;
            border-top: 1px solid #edf2f7;
        }

        .login-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            color: #334155;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            transition: all 0.2s;
        }

        .login-link:hover {
            background: #e2e8f0;
            color: #0f172a;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        /* ----- RESPONSIVE (MOBILE FRIENDLY) ----- */
        @media (max-width: 520px) {
            .register-card {
                padding: 1.5rem;
                border-radius: 1.5rem;
            }
            h2 {
                font-size: 1.6rem;
                padding-left: 0.75rem;
                margin-bottom: 1.5rem;
            }
            input {
                padding: 0.7rem 0.9rem;
            }
            .register-btn {
                padding: 0.75rem;
            }
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

<div class="register-card">
    <h2>📝 Create Account</h2>

    <form class="register-form" action="RegisterServlet" method="post">
        <div class="input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
        </div>

        <button type="submit" class="register-btn">
            ✅ Register & Continue
        </button>
    </form>

    <div class="login-wrapper">
        <a href="login.html" class="login-link">
            🔐 Already have an account? Login here
        </a>
    </div>
</div>

</body>
</html>

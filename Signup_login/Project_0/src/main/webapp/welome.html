<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .welcome-container {
            background: #2c2c2c;
            border-radius: 16px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .welcome-container:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #e0e0e0;
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .logout-btn {
            background: #3a3a3a;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .logout-btn:hover {
            background: #505050;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
        }

        .logout-btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .welcome-container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 26px;
            }
            p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Welcome! 🎉</h1>
        <p>You have successfully logged in.</p>
        <a href="login.html" class="logout-btn">Logout</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<style>
/* Reset & Base */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #1a1a1a;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Login Container Card */
.login-container {
  background: #2c2c2c;
  border-radius: 16px;
  box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
  padding: 40px 35px;
  width: 100%;
  max-width: 450px;
  transition: transform 0.3s ease;
}

.login-container:hover {
  transform: translateY(-5px);
}

/* Heading */
.login-container h2 {
  text-align: center;
  color: #e0e0e0;
  margin-bottom: 28px;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.5px;
}

/* Form Layout */
.login-container form {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* Input Fields */
.login-container input {
  padding: 14px 18px;
  border: 2px solid #444;
  border-radius: 12px;
  font-size: 16px;
  transition: all 0.3s ease;
  outline: none;
  font-family: inherit;
  background: #1f1f1f;
  color: #f0f0f0;
}

.login-container input:focus {
  border-color: #888;
  box-shadow: 0 0 0 3px rgba(136, 136, 136, 0.3);
}

.login-container input::placeholder {
  color: #777;
  font-weight: 400;
}

/* Submit Button */
.login-container button {
  background: #3a3a3a;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 8px;
  letter-spacing: 0.5px;
}

.login-container button:hover {
  background: #505050;
  transform: scale(1.02);
  box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
}

.login-container button:active {
  transform: scale(0.98);
}

/* Sign Up Link */
.login-container a {
  display: block;
  text-align: center;
  margin-top: 24px;
  color: #aaa;
  text-decoration: none;
  font-size: 14px;
  transition: color 0.3s ease;
}

.login-container a:hover {
  color: #ddd;
  text-decoration: underline;
}

/* Responsive */
@media (max-width: 480px) {
  .login-container {
    padding: 30px 20px;
  }

  .login-container h2 {
    font-size: 24px;
  }

  .login-container input {
    padding: 12px 15px;
    font-size: 14px;
  }

  .login-container button {
    padding: 12px;
    font-size: 16px;
  }
}
</style>
<body>
 <div class="login-container">
        <h2>Login</h2>
        <form action="Login" method="post">
            <input type="email" name="em" placeholder="Email" required>
            <input type="password" name="pw" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <a href="signup.html">Don't have an account? Sign Up</a>
    </div>
</body>
</html>
